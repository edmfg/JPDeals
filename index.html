const majorPartners = ['Amazon', 'Google', 'LinkedIn', 'Meta', 'Pinterest', 'Reddit', 'Snapchat', 'Spotify', 'The New York Times', 'TikTok', 'Twitch'];
const regions = ['Global', 'NA', 'EMEA', 'APAC'];
const sortOptions = [
  { value: 'createdAt-desc', label: 'Newest First' },
  { value: 'createdAt-asc', label: 'Oldest First' },
  { value: 'cost-asc', label: 'Cost: Low to High' },
  { value: 'cost-desc', label: 'Cost: High to Low' },
  { value: 'vendor-asc', label: 'Vendor: A-Z' },
  { value: 'vendor-desc', label: 'Vendor: Z-A' },
  { value: 'executionWindow-asc', label: 'Execution Window: A-Z' },
  { value: 'executionWindow-desc', label: 'Execution Window: Z-A' },
  { value: 'region-asc', label: 'Region: A-Z' },
  { value: 'region-desc', label: 'Region: Z-A' },
];

let state = {
  mode: null,
  currentPartner: null,
  isAuthenticated: false,
  deals: [],
  searchQuery: '',
  sortOption: 'createdAt-desc',
  jamesViewMode: 'tiles',
  jamesVendorFilter: 'all',
  vendorEmails: ['linkedin-contact@example.com', 'meta-ads@example.com'],
};

let expandedRows = new Set();

function loadDeals() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : initialDeals;
  } catch { return initialDeals; }
}

function saveDeals() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.deals)); } catch {}
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtMoney(n) { return '$' + Number(n).toLocaleString(); }

// ============================================================
// FILTERING & SORTING
// ============================================================
function getFilteredDeals() {
  let deals = [...state.deals];
  if (state.currentPartner) deals = deals.filter(d => d.vendor === state.currentPartner);
  if (state.mode === 'james' && state.jamesVendorFilter !== 'all') deals = deals.filter(d => d.vendor === state.jamesVendorFilter);
  const q = state.searchQuery.toLowerCase();
  if (q) deals = deals.filter(d => d.vendor.toLowerCase().includes(q) || d.description.toLowerCase().includes(q) || d.terms.toLowerCase().includes(q) || d.region.toLowerCase().includes(q));
  const [key, dir] = state.sortOption.split('-');
  deals.sort((a, b) => {
    let cmp = 0;
    if (key === 'cost') cmp = a.cost - b.cost;
    else if (key === 'createdAt') cmp = new Date(a.createdAt) - new Date(b.createdAt);
    else cmp = String(a[key] || '').localeCompare(String(b[key] || ''));
    return dir === 'desc' ? -cmp : cmp;
  });
  return deals;
}

function getUniqueVendors() {
  const vendors = new Set(state.deals.map(d => d.vendor));
  return ['all', ...Array.from(vendors).sort()];
}

// ============================================================
// DEAL CRUD
// ============================================================
function addDeal(data) {
  state.deals.push({ ...data, id: Date.now(), createdAt: new Date().toISOString() });
  saveDeals();
}

function updateDeal(id, data) {
  state.deals = state.deals.map(d => d.id === id ? { ...d, ...data } : d);
  saveDeals();
}

function removeDeal(id) {
  if (!confirm('Are you sure you want to remove this deal?')) return;
  state.deals = state.deals.filter(d => d.id !== id);
  saveDeals();
  render();
}

// ============================================================
// GEMINI API
// ============================================================
async function evaluateDealWithGemini(deal, context) {
  const apiKey = localStorage.getItem(GEMINI_KEY_STORAGE);
  if (!apiKey) return 'No API key set. Add your Gemini API key in the Vendor Comms panel.';
  const prompt = 'You are an expert media buying analyst named James. Evaluate the following media deal based on the provided context. Provide a concise analysis covering pros, cons, and a final recommendation. Format your response in markdown.\n\n**Deal Details:**\n- Vendor: ' + deal.vendor + '\n- Description: ' + deal.description + '\n- Cost: $' + deal.cost.toLocaleString() + '\n- Execution Window: ' + deal.executionWindow + '\n- Region: ' + deal.region + '\n- Special Terms: ' + deal.terms + '\n- Submitted On: ' + fmtDate(deal.createdAt) + '\n\n**My Current Priorities (Context):**\n' + context + '\n\n**Your Analysis:**';
  try {
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    if (data.candidates && data.candidates[0]) return data.candidates[0].content.parts[0].text;
    return 'Error: ' + (data.error?.message || 'Unknown error from Gemini API.');
  } catch (err) {
    return 'Error communicating with Gemini API: ' + err.message;
  }
}

function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^- (.*)/gm, '<li class="ml-4 list-disc">$1</li>')
    .replace(/\n/g, '<br>');
}

async function runGemini(dealId) {
  const ctx = document.getElementById('gemCtx-' + dealId);
  const btn = document.getElementById('gemBtn-' + dealId);
  const result = document.getElementById('gemResult-' + dealId);
  if (!ctx || !ctx.value.trim()) return;
  btn.textContent = 'Thinking...';
  btn.disabled = true;
  const deal = state.deals.find(d => d.id === dealId);
  const text = await evaluateDealWithGemini(deal, ctx.value);
  result.innerHTML = '<div class="p-4 bg-gray-800 rounded-md"><div class="text-gray-300 text-sm leading-relaxed">' + renderMarkdown(text) + '</div></div>';
  btn.textContent = 'Evaluate with Gemini \u2728';
  btn.disabled = false;
}

    '<input type="text" placeholder="Search by vendor, description, region, terms..." value="' + esc(state.searchQuery) + '" oninput="state.searchQuery=this.value;render()" class="w-full p-2 border rounded-md ' + t.input + '"></div>' +

    '</select></div></div></div>';

function mailtoAlertJames(deal) {
  return 'mailto:james.palmer@mediafuturesgroup.com?subject=' + encodeURIComponent('URGENT: Deal Update for ' + deal.vendor) + '&body=' + encodeURIComponent('Hi James,\n\nThis is an alert regarding a deal:\n\n- Vendor: ' + deal.vendor + '\n- Description: ' + deal.description.substring(0, 100) + '...\n- Cost: $' + deal.cost.toLocaleString() + '\n\nPlease log in to the MFG Media Deal Hub to review.\n\nThanks!');

      geminiSection(deal) +
      '<div class="flex justify-end space-x-3 mt-4">' +
      '<button onclick="event.stopPropagation();openDealForm(' + deal.id + ')" class="text-sm font-semibold bg-gray-600 text-gray-200 hover:bg-gray-500 px-4 py-2 rounded-md">\u270F\uFE0F Edit</button>' +
      '<button onclick="event.stopPropagation();removeDeal(' + deal.id + ')" class="text-sm font-semibold bg-red-800 text-red-200 hover:bg-red-700 px-4 py-2 rounded-md">\uD83D\uDDD1\uFE0F Remove</button>' +
      '</div></div>' : '') +
    '</div>';
}

function toggleJamesRow(id) {
  if (expandedRows.has(id)) expandedRows.delete(id); else expandedRows.add(id);
  render();
}

function renderJamesMode() {
  const deals = getFilteredDeals();
  const vendors = getUniqueVendors();
  const geminiKey = localStorage.getItem(GEMINI_KEY_STORAGE) || '';
  const monthlyLink = 'mailto:?bcc=' + state.vendorEmails.join(',') + '&subject=' + encodeURIComponent('Monthly Media Deal Update Request') + '&body=' + encodeURIComponent('Hi Partners,\n\nPlease use our MFG Media Deal Hub to update your latest available deals for the upcoming month.\n\nWe look forward to seeing what you have to offer!\n\nBest,\nJames Palmer');
  const vm = state.jamesViewMode;

  let dealsHtml;
  if (deals.length === 0) {
    const hasFilter = state.searchQuery || state.jamesVendorFilter !== 'all';
    dealsHtml = '<div class="text-center py-16 bg-james-card rounded-lg shadow-lg"><p class="text-2xl text-gray-400">' + (hasFilter ? 'No deals match your search or filter.' : 'The deal pipeline is empty.') + '</p><p class="text-gray-500 mt-2">' + (hasFilter ? 'Try a different search term or filter.' : 'Waiting for partners to submit deals... \u23F3') + '</p></div>';
  } else if (vm === 'tiles') {
    dealsHtml = '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">' + deals.map(d => renderJamesDealCard(d)).join('') + '</div>';
  } else {
    dealsHtml = '<div class="bg-james-card rounded-lg shadow-lg overflow-hidden border border-gray-700">' +
      '<div class="flex items-center p-4 bg-gray-900/75 font-semibold text-gray-400 text-sm"><div class="flex-1">VENDOR</div><div class="w-24 hidden lg:block">REGION</div><div class="flex-1 hidden md:block">DESCRIPTION</div><div class="w-32 text-right">COST</div><div class="w-32 text-right hidden sm:block">WINDOW</div><div class="w-16 text-right"></div></div>' +
      deals.map(d => renderJamesListItem(d)).join('') + '</div>';
  }

  return '<div class="p-4 sm:p-8"><div class="max-w-7xl mx-auto">' +
    '<h1 class="text-4xl font-bold text-james-text mb-8">\uD83D\uDD75\uFE0F James\' Evaluation Console</h1>' +
    '<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">' +
    '<div class="lg:col-span-2">' +
    '<div class="flex flex-wrap justify-between items-center gap-4 mb-4">' +
    '<h2 class="text-2xl font-semibold text-james-text">Active Deals (' + deals.length + ')</h2>' +
    '<div class="flex items-center gap-2 sm:gap-4">' +
    '<select onchange="state.jamesVendorFilter=this.value;render()" class="p-2 border rounded-md bg-gray-700 border-gray-600 text-gray-300 focus:ring-james-primary text-sm">' +
    vendors.map(v => '<option value="' + v + '"' + (state.jamesVendorFilter === v ? ' selected' : '') + '>' + (v === 'all' ? 'All Vendors' : v) + '</option>').join('') + '</select>' +
    '<div class="flex items-center bg-james-card border border-gray-700 rounded-md p-1">' +
    '<button onclick="state.jamesViewMode=\'tiles\';render()" class="px-3 py-1 rounded text-sm transition-colors ' + (vm === 'tiles' ? 'bg-james-primary text-white' : 'text-gray-400 hover:bg-gray-700') + '">Tiles</button>' +
    '<button onclick="state.jamesViewMode=\'list\';render()" class="px-3 py-1 rounded text-sm transition-colors ' + (vm === 'list' ? 'bg-james-primary text-white' : 'text-gray-400 hover:bg-gray-700') + '">List</button>' +
    '</div></div></div>' +
    renderFilterSort(true) +
    dealsHtml +
    '</div>' +
    '<div class="lg:col-span-1"><div class="bg-james-card rounded-lg shadow-lg p-6 sticky top-24">' +
    '<h2 class="text-2xl font-semibold text-james-text mb-4">Vendor Comms \uD83D\uDCE7</h2>' +
    '<div class="space-y-2 mb-4 max-h-48 overflow-y-auto dark-scroll">' +
    state.vendorEmails.map(e => '<div class="flex justify-between items-center bg-gray-800 p-2 rounded"><span class="text-gray-300 text-sm truncate">' + esc(e) + '</span><button onclick="removeVendorEmail(\'' + esc(e) + '\')" class="text-red-400 hover:text-red-300 flex-shrink-0 ml-2">&times;</button></div>').join('') +
    '</div>' +
    '<div class="flex space-x-2"><input type="email" id="newEmailInput" placeholder="Add new vendor email" class="flex-grow p-2 bg-gray-800 border border-gray-600 rounded-md text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-james-primary">' +
    '<button onclick="addVendorEmail()" class="bg-james-primary hover:bg-james-secondary text-white font-bold py-2 px-3 rounded-md transition-transform hover:scale-105">+</button></div>' +
    '<a href="' + monthlyLink + '" class="mt-4 w-full block text-center bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-md transition-colors">Send Monthly Update Request</a>' +
    '<div class="mt-6 pt-4 border-t border-gray-700">' +
    '<h3 class="text-sm font-semibold text-gray-400 mb-2">\uD83D\uDD11 Gemini API Key</h3>' +
    '<input type="password" id="geminiKeyInput" value="' + esc(geminiKey) + '" placeholder="Enter your Gemini API key" class="w-full p-2 bg-gray-800 border border-gray-600 rounded-md text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-james-primary text-sm">' +
    '<button onclick="saveGeminiKey()" class="mt-2 w-full bg-gray-700 hover:bg-gray-600 text-gray-300 font-semibold py-1.5 px-4 rounded-md text-sm transition-colors">Save Key</button>' +
    '</div></div></div>' +
    '</div></div></div>';
}

function addVendorEmail() {
  const input = document.getElementById('newEmailInput');
  const email = input.value.trim();
  if (email && !state.vendorEmails.includes(email)) {
    state.vendorEmails.push(email);
    render();
  }
}

function removeVendorEmail(email) {
  state.vendorEmails = state.vendorEmails.filter(e => e !== email);
  render();
}

function saveGeminiKey() {
  const input = document.getElementById('geminiKeyInput');
  localStorage.setItem(GEMINI_KEY_STORAGE, input.value.trim());
  alert('Gemini API key saved.');
}

// ============================================================
// MODALS
// ============================================================
let _partnerSelected = '';

function showPartnerSelection() {
  _partnerSelected = '';
  const partners = [...majorPartners, 'Other'];
  const el = document.createElement('div');
  el.id = 'partnerModal';
  el.className = 'fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4 fade-in';
  el.innerHTML = '<div class="bg-partner-card rounded-lg p-8 shadow-2xl w-full max-w-lg relative">' +
    '<button onclick="closeModal(\'partnerModal\')" class="absolute top-2 right-3 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>' +
    '<h2 class="text-2xl font-bold text-partner-text mb-2">Identify Yourself</h2>' +
    '<p class="text-gray-600 mb-6">Please select your company to continue.</p>' +
    '<div class="grid grid-cols-2 sm:grid-cols-3 gap-3 text-center" id="partnerGrid">' +
    partners.map(p => '<button onclick="selectPartner(this, \'' + esc(p) + '\')" class="p-4 border rounded-lg font-semibold transition-all duration-200 transform hover:scale-105 hover:shadow-md bg-white text-gray-700 hover:bg-gray-50">' + p + '</button>').join('') +
    '</div>' +
    '<div id="otherPartnerInput" class="hidden mt-4"><label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>' +
    '<input id="otherPartnerName" type="text" placeholder="Enter your company name" class="w-full p-2 border rounded-md bg-white border-gray-300 focus:ring-2 focus:ring-partner-primary"></div>' +
    '<p id="partnerError" class="text-red-500 mt-4 text-sm hidden"></p>' +
    '<button onclick="confirmPartnerSelection()" id="partnerContinueBtn" disabled class="w-full bg-partner-primary hover:bg-partner-secondary text-white font-bold py-3 px-4 rounded-md mt-6 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">Continue</button>' +
    '</div>';
  document.body.appendChild(el);
}

function selectPartner(btn, name) {
  _partnerSelected = name;
  document.getElementById('partnerGrid').querySelectorAll('button').forEach(b => {
    b.className = 'p-4 border rounded-lg font-semibold transition-all duration-200 transform hover:scale-105 hover:shadow-md bg-white text-gray-700 hover:bg-gray-50';
  });
  btn.className = 'p-4 border rounded-lg font-semibold transition-all duration-200 transform hover:scale-105 hover:shadow-md bg-partner-primary text-white ring-2 ring-offset-2 ring-partner-secondary';
  document.getElementById('otherPartnerInput').classList.toggle('hidden', name !== 'Other');
  document.getElementById('partnerContinueBtn').disabled = false;
  document.getElementById('partnerError').classList.add('hidden');
}

function confirmPartnerSelection() {
  let partner = _partnerSelected;
  if (partner === 'Other') {
    partner = document.getElementById('otherPartnerName').value.trim();
    if (!partner) {
      const err = document.getElementById('partnerError');
      err.textContent = 'Please enter your company name.';
      err.classList.remove('hidden');
      return;
    }
  }
  if (!partner) {
    const err = document.getElementById('partnerError');
    err.textContent = 'Please select your company from the list.';
    err.classList.remove('hidden');
    return;
  }
  state.currentPartner = partner;
  state.mode = 'partner';
  closeModal('partnerModal');
  render();
}

function showPasswordModal() {
  const el = document.createElement('div');
  el.id = 'passwordModal';
  el.className = 'fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 fade-in';
  el.innerHTML = '<div class="bg-james-card rounded-lg p-8 shadow-2xl w-full max-w-md">' +
    '<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-james-text">\uD83D\uDD12 James Mode Access</h2>' +
    '<button onclick="closeModal(\'passwordModal\')" class="text-gray-400 hover:text-white text-2xl">&times;</button></div>' +
    '<p class="text-gray-300 mb-4">This area is restricted. Please enter the password to continue.</p>' +
    '<form onsubmit="return handlePasswordSubmit(event)">' +
    '<input type="password" id="jamesPassword" placeholder="Enter password..." class="w-full bg-gray-800 border border-gray-600 rounded-md px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-james-primary">' +
    '<p id="passwordError" class="text-red-500 mt-2 text-sm hidden"></p>' +
    '<button type="submit" class="w-full bg-james-primary hover:bg-james-secondary text-white font-bold py-2 px-4 rounded-md mt-6 transition-colors">Unlock</button>' +
    '</form></div>';
  document.body.appendChild(el);
  setTimeout(() => document.getElementById('jamesPassword')?.focus(), 100);
}

function handlePasswordSubmit(e) {
  e.preventDefault();
  if (document.getElementById('jamesPassword').value === 'Jamesrocks') {
    state.isAuthenticated = true;
    state.mode = 'james';
    closeModal('passwordModal');
    render();
  } else {
    const err = document.getElementById('passwordError');
    err.textContent = 'Incorrect password. Please try again.';
    err.classList.remove('hidden');
  }
  return false;
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ============================================================
// DEAL FORM MODAL
// ============================================================
function openDealForm(editId) {
  const deal = editId ? state.deals.find(d => d.id === editId) : null;
  const isPartner = state.mode === 'partner';
  const isJames = state.mode === 'james';
  const t = isJames
    ? { bg: 'bg-james-bg bg-opacity-75', card: 'bg-james-card', text: 'text-james-text', primary: 'bg-james-primary', hover: 'hover:bg-james-secondary', input: 'bg-gray-700 border-gray-600 text-white focus:ring-james-primary', label: 'text-gray-300', cancel: 'bg-gray-600 hover:bg-gray-500 text-gray-200' }
    : { bg: 'bg-partner-bg bg-opacity-75', card: 'bg-partner-card', text: 'text-partner-text', primary: 'bg-partner-primary', hover: 'hover:bg-partner-secondary', input: 'bg-white border-gray-300 focus:ring-partner-primary', label: 'text-gray-700', cancel: 'bg-gray-200 hover:bg-gray-300 text-gray-700' };
  const vendorVal = deal ? deal.vendor : (isPartner && state.currentPartner ? state.currentPartner : '');

  const el = document.createElement('div');
  el.id = 'dealFormModal';
  el.className = 'fixed inset-0 ' + t.bg + ' flex items-center justify-center z-40 fade-in p-4';
  el.innerHTML = '<div class="' + t.card + ' rounded-lg p-8 shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">' +
    '<h2 class="text-2xl font-bold mb-6 ' + t.text + '">' + (deal ? '\u270F\uFE0F Edit Deal' : '\u2728 Add New Deal') + '</h2>' +
    '<div id="dealFormError" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4 hidden"></div>' +
    '<form onsubmit="return submitDealForm(event, ' + (editId || 'null') + ')">' +
    '<div class="space-y-4">' +
    '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">' +
    '<div><label class="block text-sm font-medium mb-1 ' + t.label + '">Vendor Name</label>' +
    '<input type="text" id="dfVendor" value="' + esc(vendorVal) + '" placeholder="Vendor company name" ' + (isPartner ? 'readonly' : '') + ' class="w-full p-2 border rounded-md ' + t.input + (isPartner ? ' bg-gray-200 text-gray-500 cursor-not-allowed' : '') + '"></div>' +
    '<div><label class="block text-sm font-medium mb-1 ' + t.label + '">Region</label>' +
    '<select id="dfRegion" class="w-full p-2 border rounded-md ' + t.input + '">' +
    regions.map(r => '<option value="' + r + '"' + (deal && deal.region === r ? ' selected' : '') + '>' + r + '</option>').join('') + '</select></div></div>' +
    '<div><label class="block text-sm font-medium mb-1 ' + t.label + '">Deal Description</label>' +
    '<textarea id="dfDesc" rows="4" placeholder="Describe the media deal, what\'s included?" class="w-full p-2 border rounded-md ' + t.input + '">' + (deal ? esc(deal.description) : '') + '</textarea></div>' +
    '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">' +
    '<div><label class="block text-sm font-medium mb-1 ' + t.label + '">Cost ($)</label>' +
    '<input type="number" id="dfCost" value="' + (deal ? deal.cost : '') + '" placeholder="e.g., 50000" class="w-full p-2 border rounded-md ' + t.input + '"></div>' +
    '<div><label class="block text-sm font-medium mb-1 ' + t.label + '">Execution Window</label>' +
    '<input type="text" id="dfWindow" value="' + (deal ? esc(deal.executionWindow) : '') + '" placeholder="e.g., Q4 2024, November 1-15" class="w-full p-2 border rounded-md ' + t.input + '"></div></div>' +
    '<div><label class="block text-sm font-medium mb-1 ' + t.label + '">Special Terms (optional)</label>' +
    '<textarea id="dfTerms" rows="3" placeholder="Any discounts, deadlines, or special conditions?" class="w-full p-2 border rounded-md ' + t.input + '">' + (deal ? esc(deal.terms) : '') + '</textarea></div>' +
    '<div class="flex justify-end space-x-4 pt-4">' +
    '<button type="button" onclick="closeModal(\'dealFormModal\')" class="py-2 px-4 rounded-md font-semibold ' + t.cancel + '">Cancel</button>' +
    '<button type="submit" class="py-2 px-6 rounded-md font-semibold text-white ' + t.primary + ' ' + t.hover + ' transition-colors">Save Deal</button>' +
    '</div></div></form></div>';
  document.body.appendChild(el);
}

function submitDealForm(e, editId) {
  e.preventDefault();
  const vendor = document.getElementById('dfVendor').value.trim();
  const description = document.getElementById('dfDesc').value.trim();
  const cost = Number(document.getElementById('dfCost').value);
  const executionWindow = document.getElementById('dfWindow').value.trim();
  const terms = document.getElementById('dfTerms').value.trim();
  const region = document.getElementById('dfRegion').value;
  if (!vendor || !description || !cost || cost <= 0 || !executionWindow) {
    const err = document.getElementById('dealFormError');
    err.textContent = 'Please fill out all required fields with valid values.';
    err.classList.remove('hidden');
    return false;
  }
  const data = { vendor, description, cost, terms, executionWindow, region };
  if (editId) updateDeal(editId, data); else addDeal(data);
  closeModal('dealFormModal');
  render();
  return false;
}

// ============================================================
// NAVIGATION
// ============================================================
function handleLogout() {
  state.currentPartner = null;
  state.isAuthenticated = false;
  state.mode = null;
  state.searchQuery = '';
  state.sortOption = 'createdAt-desc';
  state.jamesVendorFilter = 'all';
  expandedRows.clear();
  render();
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  const app = document.getElementById('app');

  // Landing page
  if (!state.currentPartner && !state.isAuthenticated) {
    document.body.className = 'bg-partner-bg min-h-screen';
    app.innerHTML = '<div class="min-h-screen bg-partner-bg flex flex-col items-center justify-center p-4">' +
      '<div class="bg-white/80 backdrop-blur-sm p-8 sm:p-12 rounded-xl shadow-2xl text-center max-w-lg w-full fade-in">' +
      '<h1 class="text-4xl font-bold text-gray-800 mb-2">MFG Media Deal Hub \uD83E\uDD1D</h1>' +
      '<p class="text-lg text-gray-600 mb-8">Your central place for managing media partnership deals.</p>' +
      '<div class="flex flex-col sm:flex-row gap-4 justify-center">' +
      '<button onclick="showPartnerSelection()" class="bg-partner-primary hover:bg-partner-secondary text-white font-bold py-4 px-8 rounded-lg shadow-lg transition-transform hover:scale-105">Continue as Partner</button>' +
      '<button onclick="showPasswordModal()" class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-4 px-8 rounded-lg shadow-lg transition-transform hover:scale-105">Continue as James</button>' +
      '</div></div></div>';
    return;
  }

  const isJames = state.mode === 'james' && state.isAuthenticated;
  document.body.className = (isJames ? 'bg-james-bg' : 'bg-partner-bg') + ' min-h-screen transition-colors duration-500';

  const header = '<header class="p-4 shadow-md bg-white/80 backdrop-blur-sm sticky top-0 z-10">' +
    '<div class="max-w-7xl mx-auto flex justify-between items-center">' +
    '<h1 class="text-2xl font-bold text-gray-800">MFG Media Deal Hub \uD83E\uDD1D</h1>' +
    '<div class="flex items-center space-x-4">' +
    (isJames ? '<span class="font-semibold text-james-primary">James\' Console</span>' : '') +
    '<button onclick="handleLogout()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-md text-sm transition-colors">' + (state.currentPartner ? 'Switch Partner' : 'Log Out') + '</button>' +
    '</div></div></header>';

  app.innerHTML = header + '<main>' + (isJames ? renderJamesMode() : renderPartnerMode()) + '</main>';
}

// ============================================================
// INIT
// ============================================================
state.deals = loadDeals();
render();
</script>
